<style>
:root {
  --bg: #F5F3EE;
  --bg2: #EDEAE2;
  --surface: #FAFAF7;
  --border: #D8D4CA;
  --border2: #C8C3B8;
  --text: #1A1916;
  --text2: #5A5750;
  --text3: #8A867E;
  --dog: #2B5EA7;
  --dog-bg: #EBF0FA;
  --dog-border: #A8BFEB;
  --cat: #1A7A52;
  --cat-bg: #E8F5EE;
  --cat-border: #8ECDB0;
  --warn: #8B4513;
  --warn-bg: #FDF0E6;
  --danger: #A32D2D;
  --danger-bg: #FCEAEA;
  --mono: 'DM Mono', monospace;
  --sans: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

.app-header {
  background: var(--text);
  color: #F5F3EE;
  padding: 20px 32px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.app-header h1 {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.app-header .subtitle {
  font-family: var(--mono);
  font-size: 11px;
  color: #8A8780;
  letter-spacing: 0.05em;
}

.layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: calc(100vh - 60px);
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.main {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
}

/* Section */
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Species toggle */
.species-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.sp-btn {
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: transparent;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.sp-btn .sp-icon { font-size: 22px; }
.sp-btn.dog-active { background: var(--dog-bg); border-color: var(--dog); color: var(--dog); }
.sp-btn.cat-active { background: var(--cat-bg); border-color: var(--cat); color: var(--cat); }

/* Slider input */
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-label { font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
.input-label .val-badge {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 4px;
}
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--bg2);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
  border: 2px solid var(--surface);
  box-shadow: 0 0 0 1px var(--border2);
}

/* BCS selector */
.bcs-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 3px;
}
.bcs-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 2px;
  border-radius: 6px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.12s;
  font-size: 11px;
}
.bcs-cell .bcs-n { font-size: 14px; font-weight: 600; line-height: 1; }
.bcs-cell .bcs-f { font-family: var(--mono); font-size: 9px; margin-top: 2px; opacity: 0.8; }
.bcs-cell.active { border-color: var(--text) !important; }

/* Concentration input */
.conc-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.select-field, .number-field {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 100%;
}
.select-field:focus, .number-field:focus { border-color: var(--border2); }

/* Result cards */
.result-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 14px 12px;
}
.result-card.primary {
  background: var(--text);
  border-color: var(--text);
}
.result-card .rc-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}
.result-card.primary .rc-label { color: #8A8780; }
.result-card .rc-val {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.result-card.primary .rc-val { color: #F5F3EE; }
.result-card .rc-unit {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
}
.result-card.primary .rc-unit { color: #8A8780; }

/* Formula box */
.formula-box {
  background: var(--text);
  color: #C8C3B8;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  padding: 16px 18px;
  border-radius: var(--radius-lg);
  white-space: pre;
  overflow-x: auto;
}
.formula-box .highlight { color: #F5F3EE; font-weight: 500; }
.formula-box .comment { color: #5A5750; }

/* Alert */
.alert {
  display: none;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.5;
}
.alert.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid #E8C49A; display: block; }
.alert.danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #F5AAAA; display: block; }
.alert.info { background: var(--dog-bg); color: var(--dog); border: 1px solid var(--dog-border); display: block; }
.alert.success { background: var(--cat-bg); color: var(--cat); border: 1px solid var(--cat-border); display: block; }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab-btn {
  padding: 8px 16px;
  border: none;
  background: transparent;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.12s;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.tab-content { display: none; padding-top: 16px; }
.tab-content.active { display: block; }

/* Reference table */
.ref-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.ref-table thead th {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
}
.ref-table tbody td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.ref-table tbody tr:hover td { background: var(--bg2); }
.ref-table tbody tr.selected td { background: var(--dog-bg); color: var(--dog); font-weight: 500; }
.ref-table tbody tr.selected-cat td { background: var(--cat-bg); color: var(--cat); font-weight: 500; }

/* Protocol guide */
.protocol-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.protocol-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.protocol-card h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.protocol-card h3 .pc-icon {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.pc-icon.blue { background: var(--dog-bg); color: var(--dog); }
.pc-icon.green { background: var(--cat-bg); color: var(--cat); }
.pc-icon.amber { background: #FDF0E6; color: #8B4513; }
.pc-icon.red { background: var(--danger-bg); color: var(--danger); }
.protocol-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.protocol-list li {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
  padding-left: 14px;
  position: relative;
}
.protocol-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 10px;
  top: 2px;
}
.protocol-list li strong { color: var(--text); font-weight: 500; }

/* BCS description row */
.bcs-desc-row {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 3px;
  margin-top: 4px;
}
.bcs-desc-cell {
  text-align: center;
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
  line-height: 1.3;
  padding: 2px 0;
}

/* Panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}

/* Tag */
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.tag-lbw { background: #FDF0E6; color: #8B4513; }
.tag-tbw { background: var(--dog-bg); color: var(--dog); }
.tag-rec { background: var(--text); color: #F5F3EE; }

/* Print */
@media print {
  .sidebar { display: none; }
  .layout { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .result-row { grid-template-columns: 1fr 1fr; }
  .protocol-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="layout">

  <!-- SIDEBAR: inputs -->
  <aside class="sidebar">

    <div>
      <div class="section-title">종 선택</div>
      <div class="species-toggle">
        <button class="sp-btn dog-active" id="btn-dog" onclick="setSpecies('dog')">
          <span class="sp-icon">🐕</span>
          <span>개 (Dog)</span>
        </button>
        <button class="sp-btn" id="btn-cat" onclick="setSpecies('cat')">
          <span class="sp-icon">🐈</span>
          <span>고양이 (Cat)</span>
        </button>
      </div>
    </div>

    <div>
      <div class="section-title">체중 입력</div>
      <div class="input-group">
        <div class="input-label">
          <span>전체 체중 (TBW)</span>
          <span class="val-badge" id="bw-badge">15.0 kg</span>
        </div>
        <input type="range" id="bw-slider" min="1" max="60" step="0.5" value="15" oninput="onBWSlider()">
        <div style="display:flex; align-items:center; gap:8px; margin-top:2px;">
          <span style="font-size:11px; color:var(--text3);">직접 입력</span>
          <input type="number" id="bw-input" min="0.5" max="100" step="0.5" value="15.0" style="width:80px; padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-family:var(--mono); font-size:13px; background:var(--bg); color:var(--text); outline:none;" oninput="onBWInput()">
          <span style="font-size:12px; color:var(--text2);">kg</span>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">BCS 선택 <span style="font-weight:400; text-transform:none; letter-spacing:0; font-family:var(--sans);">— 체지방률 자동 추정</span></div>
      <div class="bcs-grid" id="bcs-grid"></div>
      <div class="bcs-desc-row" id="bcs-desc-row"></div>
      <div style="margin-top:8px; font-size:12px; color:var(--text2);" id="bcs-text"></div>
    </div>

    <div>
      <div class="section-title">조영제 설정</div>
      <div class="conc-row">
        <div>
          <div style="font-size:11px; color:var(--text3); margin-bottom:4px;">농도 (mgI/mL)</div>
          <select class="select-field" id="conc-select" onchange="calc()">
            <option value="240">240 mgI/mL</option>
            <option value="300" selected>300 mgI/mL</option>
            <option value="350">350 mgI/mL</option>
            <option value="370">370 mgI/mL</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px; color:var(--text3); margin-bottom:4px;">목표 용량</div>
          <select class="select-field" id="dose-select" onchange="calc()">
            <option value="auto">자동 (권장)</option>
            <option value="400">400 mgI/kg</option>
            <option value="600">600 mgI/kg</option>
            <option value="660">660 mgI/kg</option>
            <option value="700">700 mgI/kg</option>
            <option value="740">740 mgI/kg</option>
            <option value="750">750 mgI/kg</option>
            <option value="800">800 mgI/kg</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">주입 속도</div>
      <div class="input-group">
        <div class="input-label">
          <span>주입 속도 (mL/s)</span>
          <span class="val-badge" id="rate-badge">2.0 mL/s</span>
        </div>
        <input type="range" id="rate-slider" min="0.5" max="5" step="0.1" value="2.0" oninput="onRateSlider()">
      </div>
      <div id="rate-note" style="margin-top:6px; font-size:11px; color:var(--text3);"></div>
    </div>

  </aside>

  <!-- MAIN: results + tabs -->
  <main class="main">

    <!-- Result summary -->
    <div>
      <div class="section-title">계산 결과</div>
      <div class="result-row" id="result-row"></div>
      <div id="alert-box" style="margin-top:10px;"></div>
    </div>

    <!-- Formula -->
    <div>
      <div class="section-title">계산 과정</div>
      <pre class="formula-box" id="formula-box"></pre>
    </div>

    <!-- Tabs -->
    <div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('ref', this)">전체 용량 참조표</button>
        <button class="tab-btn" onclick="showTab('protocol', this)">주입 프로토콜 가이드</button>
        <button class="tab-btn" onclick="showTab('safety', this)">안전성 체크리스트</button>
      </div>

      <!-- Tab: Reference table -->
      <div id="tab-ref" class="tab-content active">
        <div style="overflow-x:auto;">
          <table class="ref-table" id="ref-table"></table>
        </div>
        <div style="margin-top:8px; font-size:11px; color:var(--text3);" id="ref-note"></div>
      </div>

      <!-- Tab: Protocol -->
      <div id="tab-protocol" class="tab-content">
        <div class="protocol-grid" id="protocol-grid"></div>
      </div>

      <!-- Tab: Safety -->
      <div id="tab-safety" class="tab-content">
        <div id="safety-content"></div>
      </div>

    </div>
  </main>
</div>

  { bcs:4, fat:20, label:'정상하한',   short:'정상-',  color:'#97C459', tc:'#27500A', bg:'#EAF3DE' },
  { bcs:5, fat:25, label:'정상',       short:'정상',   color:'#1D9E75', tc:'#04342C', bg:'#E1F5EE' },
  { bcs:6, fat:30, label:'정상상한',   short:'정상+',  color:'#378ADD', tc:'#042C53', bg:'#E6F1FB' },
  { bcs:7, fat:35, label:'과체중',     short:'과체중', color:'#7F77DD', tc:'#26215C', bg:'#EEEDFE' },
  { bcs:8, fat:45, label:'비만',       short:'비만',   color:'#D4537E', tc:'#4B1528', bg:'#FBEAF0' },
  { bcs:9, fat:55, label:'고도비만',   short:'고비만', color:'#E24B4A', tc:'#501313', bg:'#FCEBEB' },
];
var catBCS = [
  { bcs:1, fat:5,  label:'극도저체중', short:'극저',   color:'#F7C1C1', tc:'#791F1F', bg:'#FCEBEB' },
  { bcs:2, fat:10, label:'저체중',     short:'저체중', color:'#F0997B', tc:'#712B13', bg:'#FAECE7' },
  { bcs:3, fat:15, label:'마름',       short:'마름',   color:'#EF9F27', tc:'#633806', bg:'#FAEEDA' },
  { bcs:4, fat:20, label:'정상하한',   short:'정상-',  color:'#97C459', tc:'#27500A', bg:'#EAF3DE' },
  { bcs:5, fat:25, label:'정상',       short:'정상',   color:'#1D9E75', tc:'#04342C', bg:'#E1F5EE' },
  { bcs:6, fat:30, label:'정상상한',   short:'정상+',  color:'#378ADD', tc:'#042C53', bg:'#E6F1FB' },
  { bcs:7, fat:38, label:'과체중',     short:'과체중', color:'#7F77DD', tc:'#26215C', bg:'#EEEDFE' },
  { bcs:8, fat:46, label:'비만',       short:'비만',   color:'#D4537E', tc:'#4B1528', bg:'#FBEAF0' },
  { bcs:9, fat:54, label:'고도비만',   short:'고비만', color:'#E24B4A', tc:'#501313', bg:'#FCEBEB' },
];

function getData() { return species === 'dog' ? dogBCS : catBCS; }
function getCurrent() { return getData().find(function(d){ return d.bcs === selBCS; }); }

function setSpecies(s) {
  species = s;
  document.getElementById('btn-dog').className = 'sp-btn' + (s==='dog' ? ' dog-active' : '');
  document.getElementById('btn-cat').className = 'sp-btn' + (s==='cat' ? ' cat-active' : '');
  var bwSlider = document.getElementById('bw-slider');
  if (s === 'cat') {
    bwSlider.max = 12;
    var cur = parseFloat(bwSlider.value);
    if (cur > 12) { bwSlider.value = 5; document.getElementById('bw-input').value = 5.0; }
  } else {
    bwSlider.max = 60;
  }
  var doseSelect = document.getElementById('dose-select');
  doseSelect.value = 'auto';
  renderBCSGrid();
  calc();
  renderRefTable();
  renderProtocol();
  renderSafety();
}

function onBWSlider() {
  var v = parseFloat(document.getElementById('bw-slider').value);
  document.getElementById('bw-input').value = v.toFixed(1);
  calc(); renderRefTable();
}
function onBWInput() {
  var v = parseFloat(document.getElementById('bw-input').value) || 1;
  var max = species === 'dog' ? 60 : 12;
  if (v > max) { v = max; document.getElementById('bw-input').value = v; }
  document.getElementById('bw-slider').value = v;
  calc(); renderRefTable();
}
function onRateSlider() {
  var v = parseFloat(document.getElementById('rate-slider').value);
  document.getElementById('rate-badge').textContent = v.toFixed(1) + ' mL/s';
  updateRateNote(v);
  calc();
}

function updateRateNote(rate) {
  var note = document.getElementById('rate-note');
  if (rate < 1.0) note.textContent = '소형 동물 / 소구경 카테터에 적합 (22–24G)';
  else if (rate < 2.0) note.textContent = '일반 복부 CECT에 적합 (20–22G)';
  else if (rate < 3.0) note.textContent = '혈관 CTA에 적합 (18–20G)';
  else note.textContent = '고속 혈관 CTA — 18G 이상 카테터 필요';
}

function getBW() { return parseFloat(document.getElementById('bw-input').value) || 1; }
function getConc() { return parseInt(document.getElementById('conc-select').value); }
function getRate() { return parseFloat(document.getElementById('rate-slider').value); }

function getRecDose(bcs) {
  var doseSelect = document.getElementById('dose-select').value;
  if (doseSelect !== 'auto') return parseInt(doseSelect);
  if (species === 'dog') {
    if (bcs <= 3) return 600;
    if (bcs <= 6) return 700;
    return 700;
  } else {
    if (bcs <= 3) return 600;
    if (bcs <= 6) return 660;
    return 660;
  }
}

function renderBCSGrid() {
  var data = getData();
  var grid = document.getElementById('bcs-grid');
  var desc = document.getElementById('bcs-desc-row');
  grid.innerHTML = ''; desc.innerHTML = '';
  data.forEach(function(d) {
    var cell = document.createElement('div');
    cell.className = 'bcs-cell' + (d.bcs === selBCS ? ' active' : '');
    cell.style.background = d.bg;
    cell.innerHTML = '<span class="bcs-n" style="color:'+d.tc+'">'+d.bcs+'</span><span class="bcs-f" style="color:'+d.tc+'">'+d.fat+'%</span>';
    cell.onclick = (function(bcs){ return function(){ selBCS = bcs; renderBCSGrid(); calc(); renderRefTable(); }; })(d.bcs);
    grid.appendChild(cell);

    var dc = document.createElement('div');
    dc.className = 'bcs-desc-cell';
    dc.textContent = d.short;
    desc.appendChild(dc);
  });

  var cur = getCurrent();
  document.getElementById('bcs-text').textContent =
    'BCS ' + cur.bcs + ' (' + cur.label + ') — 체지방률 약 ' + cur.fat + '%';
}

function calc() {
  var bw = getBW();
  var fat = getCurrent().fat;
  var lbw = bw * (1 - fat / 100);
  var conc = getConc();
  var recDose = getRecDose(selBCS);
  var stdDose = species === 'dog' ? 600 : 660;

  document.getElementById('bw-badge').textContent = bw.toFixed(1) + ' kg';

  var lbwVol = (recDose * lbw / conc);
  var tbwVol = (stdDose * bw / conc);
  var diff = tbwVol - lbwVol;
  var diffPct = tbwVol > 0 ? (diff / tbwVol * 100) : 0;
  var maxVol = species === 'dog' ? 150 : 30;
  var injDur = lbwVol / getRate();

  // result cards
  var rrow = document.getElementById('result-row');
  rrow.innerHTML =
    '<div class="result-card"><div class="rc-label">제지방체중 (LBW)</div><div class="rc-val">' + lbw.toFixed(2) + '</div><div class="rc-unit">kg &nbsp;(지방 ' + (bw*fat/100).toFixed(1) + ' kg 제외)</div></div>' +
    '<div class="result-card primary"><div class="rc-label">권장 조영제 용량</div><div class="rc-val">' + (lbwVol > maxVol ? maxVol.toFixed(1) : lbwVol.toFixed(1)) + '</div><div class="rc-unit">mL &nbsp;(' + recDose + ' mgI/kg × LBW)</div></div>' +
    '<div class="result-card"><div class="rc-label">주입 예상 시간</div><div class="rc-val">' + injDur.toFixed(0) + '</div><div class="rc-unit">초 &nbsp;(' + getRate().toFixed(1) + ' mL/s 기준)</div></div>';

  // alert
  var abox = document.getElementById('alert-box');
  if (lbwVol > maxVol) {
    abox.innerHTML = '<div class="alert danger">계산량 ' + lbwVol.toFixed(1) + ' mL이 최대 권장량 ' + maxVol + ' mL을 초과합니다 — ' + maxVol + ' mL로 제한하여 사용하세요.</div>';
  } else if (selBCS >= 8) {
    abox.innerHTML = '<div class="alert warn">BCS ' + selBCS + ' (비만/고도비만): TBW 기준 투여 시 조영 과도 및 신독성 위험이 높습니다. LBW 기준 적용이 강하게 권장됩니다. 절감량: ' + (diff > 0 ? diff.toFixed(1) : 0) + ' mL (' + (diffPct > 0 ? diffPct.toFixed(0) : 0) + '%)</div>';
  } else if (selBCS >= 6) {
    abox.innerHTML = '<div class="alert info">BCS ' + selBCS + ': LBW 기준 적용 시 TBW 대비 ' + (diff > 0 ? diff.toFixed(1) : 0) + ' mL 절감, 환자 간 조영 변동성 감소.</div>';
  } else {
    abox.innerHTML = '<div class="alert success">BCS ' + selBCS + ': 정상~저체중 범위 — TBW와 LBW 차이가 작습니다. 두 방법 모두 적용 가능.</div>';
  }

  // formula
  var fatMass = (bw * fat / 100).toFixed(2);
  var formula = document.getElementById('formula-box');
  formula.innerHTML =
    '<span class="comment">/* 1단계: 제지방체중 (LBW) 계산 */</span>\n' +
    'LBW  = TBW × (1 − 체지방률 / 100)\n' +
    '     = ' + bw.toFixed(1) + ' × (1 − ' + fat + ' / 100)\n' +
    '     = ' + bw.toFixed(1) + ' × ' + (1 - fat/100).toFixed(2) + '\n' +
    '     = <span class="highlight">' + lbw.toFixed(2) + ' kg</span>  (지방량 ' + fatMass + ' kg 제외)\n\n' +
    '<span class="comment">/* 2단계: 조영제 용량 계산 */</span>\n' +
    '용량 = 목표 mgI/kg × LBW ÷ 농도\n' +
    '     = ' + recDose + ' mgI/kg × ' + lbw.toFixed(2) + ' kg ÷ ' + conc + ' mgI/mL\n' +
    '     = <span class="highlight">' + lbwVol.toFixed(1) + ' mL</span>' + (lbwVol > maxVol ? '  → 상한 적용: <span class="highlight">' + maxVol + ' mL</span>' : '') + '\n\n' +
    '<span class="comment">/* 3단계: 주입 시간 */</span>\n' +
    '주입시간 = ' + (lbwVol > maxVol ? maxVol : lbwVol).toFixed(1) + ' mL ÷ ' + getRate().toFixed(1) + ' mL/s\n' +
    '        = <span class="highlight">' + injDur.toFixed(0) + '초</span>';
}

function renderRefTable() {
  var data = getData();
  var bw = getBW();
  var conc = getConc();
  var stdDose = species === 'dog' ? 600 : 660;
  var maxVol = species === 'dog' ? 150 : 30;

  var html = '<thead><tr>' +
    '<th>BCS</th><th>분류</th><th>체지방률</th><th>LBW (kg)</th>' +
    '<th>LBW 기준<br>용량 (mL)</th><th>TBW 기준<br>용량 (mL)</th><th>절감량</th><th>비고</th>' +
    '</tr></thead><tbody>';

  data.forEach(function(d) {
    var lbw = bw * (1 - d.fat / 100);
    var recDose = getRecDose(d.bcs);
    var lbwVol = recDose * lbw / conc;
    var tbwVol = stdDose * bw / conc;
    var diff = tbwVol - lbwVol;
    var diffPct = diff / tbwVol * 100;
    var overMax = lbwVol > maxVol;
    var note = overMax ? '★ 상한 적용 ' + maxVol + ' mL' : (d.bcs >= 7 ? 'LBW 강권' : d.bcs <= 3 ? 'TBW≈LBW' : '');
    var cls = d.bcs === selBCS ? (species === 'dog' ? ' class="selected"' : ' class="selected-cat"') : '';
    html += '<tr' + cls + '>' +
      '<td style="font-family:var(--mono);font-weight:500;">' + d.bcs + '</td>' +
      '<td>' + d.label + '</td>' +
      '<td style="font-family:var(--mono);">' + d.fat + '%</td>' +
      '<td style="font-family:var(--mono);">' + lbw.toFixed(2) + '</td>' +
      '<td style="font-family:var(--mono);font-weight:500;">' + (overMax ? maxVol.toFixed(1) : lbwVol.toFixed(1)) + '</td>' +
      '<td style="font-family:var(--mono);color:var(--text3);">' + tbwVol.toFixed(1) + '</td>' +
      '<td style="font-family:var(--mono);color:' + (diff > 0 ? 'var(--cat)' : 'var(--text3)') + ';">' + (diff > 0 ? '−' + diff.toFixed(1) + ' (' + diffPct.toFixed(0) + '%)' : '±0') + '</td>' +
      '<td style="font-size:11px;color:var(--text3);">' + note + '</td>' +
      '</tr>';
  });
  html += '</tbody>';
  document.getElementById('ref-table').innerHTML = html;

  var conc_label = document.getElementById('conc-select').options[document.getElementById('conc-select').selectedIndex].text;
  document.getElementById('ref-note').textContent =
    '기준: ' + conc_label + ' · ' + (species === 'dog' ? 'LBW 기준 700 mgI/kg (BCS≥4), 600 mgI/kg (BCS≤3)' : 'LBW 기준 660 mgI/kg · 최대 ' + maxVol + ' mL') +
    ' · 현재 선택 BCS ' + selBCS + ' 행이 강조 표시됨';
}

function renderProtocol() {
  var isDog = species === 'dog';
  var bw = getBW();
  var conc = getConc();
  var fat = getCurrent().fat;
  var lbw = (bw * (1 - fat/100)).toFixed(1);
  var rate = getRate().toFixed(1);

  var grid = document.getElementById('protocol-grid');
  grid.innerHTML =
    '<div class="protocol-card">' +
      '<h3><span class="pc-icon blue">1</span>전처치</h3>' +
      '<ul class="protocol-list">' +
      '<li>조영제 투여 전 <strong>4–6시간 절식</strong> 권장 (마취 안전)</li>' +
      '<li>탈수 환자는 <strong>사전 수액 보정 후</strong> 촬영 (탈수 = 상대적 금기)</li>' +
      '<li>기존 신기능 저하(Cr 상승), 심부전, 쇼크 환자: 위험/이익 재평가</li>' +
      '<li>' + (isDog ? '체중 2 kg 미만 소형견' : '고령묘, CKD 고양이') + ': 최소 용량(400–500 mgI/kg) 우선 고려</li>' +
      '</ul>' +
    '</div>' +
    '<div class="protocol-card">' +
      '<h3><span class="pc-icon green">2</span>카테터 / 주입</h3>' +
      '<ul class="protocol-list">' +
      '<li>권장 카테터 규격: <strong>' + (parseFloat(rate) >= 3 ? '18G 이상' : parseFloat(rate) >= 1.5 ? '20–22G' : '22–24G') + '</strong></li>' +
      '<li>주입 부위: <strong>두부 정맥 (cephalic vein)</strong> 또는 요측피부정맥</li>' +
      '<li>주입 전 생리식염수 flush로 카테터 개통 확인</li>' +
      '<li>조영제 주입 후 <strong>생리식염수 flush</strong> (조영제의 50% 볼륨) — 동맥기 조영 향상</li>' +
      '<li>주입 속도: <strong>' + rate + ' mL/s</strong> (설정값) · Power injector 권장</li>' +
      '</ul>' +
    '</div>' +
    '<div class="protocol-card">' +
      '<h3><span class="pc-icon amber">3</span>스캔 타이밍</h3>' +
      '<ul class="protocol-list">' +
      '<li><strong>Bolus tracking</strong>: 복부 대동맥 ROI 설정 · 임계값 100–150 HU 도달 시 스캔 트리거</li>' +
      '<li><strong>동맥기(AP)</strong>: 대동맥 도달 후 +5–10초</li>' +
      '<li><strong>문맥기(PVP)</strong>: 대동맥 도달 후 +30–40초 (간 실질 최대 조영)</li>' +
      '<li><strong>지연기</strong>: 주입 후 2–3분 (신장, 방광 평가 시)</li>' +
      '<li>' + (isDog ? '64-row MDCT: bolus tracking 권장 / 4–16 row: 고정 주입시간 프로토콜 고려' : '고양이 대동맥 피크: 고정속도(5 mL/s) 기준 ~11초, 고정시간(20초) 기준 ~25초') + '</li>' +
      '</ul>' +
    '</div>' +
    '<div class="protocol-card">' +
      '<h3><span class="pc-icon red">4</span>투여 후 모니터링</h3>' +
      '<ul class="protocol-list">' +
      '<li>주입 중·후 <strong>심박수, 혈압</strong> 5분 간격 모니터링</li>' +
      '<li>비이온성 조영제 부작용: 대부분 경미 (심박수 변화, 일시적 혈압 변동)</li>' +
      '<li>이온성 조영제 사용 시 부작용 빈도 유의하게 높음 — <strong>비이온성 제제 사용 원칙</strong></li>' +
      '<li>촬영 후 12–24시간 내 수분 섭취 충분히 유지 (신장 배설 촉진)</li>' +
      '<li>신기능 저하 환자: 촬영 후 48시간 내 크레아티닌 재검사 권장</li>' +
      '</ul>' +
    '</div>';
}

function renderSafety() {
  var fat = getCurrent().fat;
  var bw = getBW();
  var isDog = species === 'dog';

  var checks = [
    { label: '탈수 없음 (점막 촉촉, 피부 탄력 정상)', ok: true },
    { label: '신기능 정상 (BUN/Cr 정상 범위)', ok: true },
    { label: '심부전 없음', ok: true },
    { label: '비이온성 조영제 사용', ok: true, note: '이온성 사용 시 부작용 위험 유의하게 증가 (Pollard 2008)' },
    { label: 'Power injector 또는 빠른 bolus 준비', ok: fat >= 30 || bw > 30 },
    { label: 'BCS 기반 LBW 용량 적용 (비만 환자)', ok: fat >= 30, warn: fat < 30 ? '비만이 아닌 경우 TBW 기준도 허용' : null },
    { label: '최대 용량 제한 확인 (' + (isDog ? '150' : '30') + ' mL)', ok: true },
    { label: '조영제 투여 전 수액 라인 개통 확인', ok: true },
    { label: '마취 모니터링 준비 완료', ok: true },
    { label: (isDog ? '신기능 저하견: 반복 투여 6–8주 이상 간격' : '고령묘 / CKD 고양이: 수액 전처치 필수'), ok: true, note: isDog ? 'Kirberger 2012' : 'Prüllage 2022' },
  ];

  var html = '<div style="display:flex; flex-direction:column; gap:6px;">';
  checks.forEach(function(c) {
    var color = c.ok ? 'var(--cat)' : 'var(--warn)';
    var icon = c.ok ? '✓' : '!';
    html += '<div style="display:flex; gap:10px; align-items:flex-start; padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);">' +
      '<span style="font-weight:600; color:' + color + '; font-size:13px; min-width:16px;">' + icon + '</span>' +
      '<div><span style="font-size:13px; color:var(--text);">' + c.label + '</span>' +
      (c.note ? '<div style="font-size:11px; color:var(--text3); margin-top:2px;">' + c.note + '</div>' : '') +
      (c.warn ? '<div style="font-size:11px; color:var(--warn); margin-top:2px;">' + c.warn + '</div>' : '') +
      '</div></div>';
  });
  html += '</div>';
  html += '<div style="margin-top:12px; padding:10px 14px; background:var(--bg2); border-radius:var(--radius); font-size:11px; color:var(--text3); line-height:1.6;">';
  html += '근거 문헌: Kan et al. (Vet Radiol Ultrasound 2022) · Pollard et al. (Am J Vet Res 2008) · Scarabelli et al. (Vet Anaesth Analg 2016) · Kirberger et al. (Acta Vet Scand 2012) · Prüllage et al. (J Feline Med Surg 2022)';
  html += '</div>';

  document.getElementById('safety-content').innerHTML = html;
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// init
renderBCSGrid();
calc();
renderRefTable();
renderProtocol();
renderSafety();
updateRateNote(2.0);
</script>
</body>
</html>
